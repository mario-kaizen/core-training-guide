server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header Content-Security-Policy "frame-ancestors 'self' https://*.kaizencollective.com.au https://lighthouse.mariopaguio.com";

    location / {
        try_files $uri $uri/index.html =404;
    }

    location /screenshots/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
